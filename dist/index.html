<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$RIOT — The Agentic Memory Layer for Sui</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0a07; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
    .pink { color: #ff2a6d; }
    .green { color: #2ec4b6; }
    .gray { color: #a08060; }
    .dark { background: rgba(0,0,0,0.5); }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Courier New', monospace; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; }
    .btn-pink { background: linear-gradient(135deg, #ff2a6d, #ff6b35); color: #fff; }
    .btn-pink:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,42,109,0.5); }
    .btn-ghost { background: rgba(255,255,255,0.1); color: #a08060; border: 1px solid rgba(255,255,255,0.2); }
    input { padding: 14px 18px; background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'Courier New', monospace; font-size: 14px; outline: none; }
    input:focus { border-color: #ff2a6d; }
    .agent { cursor: pointer; transition: all 0.3s; padding: 12px; border-radius: 10px; border: 2px solid transparent; }
    .agent:hover { background: rgba(255,255,255,0.05); transform: translateY(-2px); }
    .agent.sel { border-color: currentColor; }
    .glitch { text-shadow: 0 0 20px rgba(255,42,109,0.8); animation: glitch 3s infinite; }
    @keyframes glitch { 0%,90%,100% { transform: none; } 92% { transform: translate(-2px,1px); } 94% { transform: translate(2px,-1px); } }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-green { background: #2ec4b6; }
    .dot-red { background: #ff2a6d; }
    .msg-user { background: rgba(255,42,109,0.15); padding: 12px 16px; border-radius: 12px 12px 4px 12px; max-width: 75%; margin-left: auto; font-size: 14px; line-height: 1.5; }
    .msg-agent { background: rgba(255,255,255,0.05); padding: 12px 16px; border-radius: 12px 12px 12px 4px; max-width: 75%; font-size: 14px; line-height: 1.5; }
    .msg-sys { background: rgba(46,196,182,0.1); padding: 10px 16px; border-radius: 8px; font-size: 12px; color: #a08060; text-align: center; max-width: 85%; margin: 0 auto; }
    .mem-item { padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 8px; font-size: 12px; }
  </style>
</head>
<body>
<div id="app" style="width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden">
  <div style="padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid rgba(255,42,109,0.3);flex-shrink:0;background:rgba(0,0,0,0.5)">
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:28px;font-weight:bold;letter-spacing:4px;text-shadow:0 0 20px rgba(255,42,109,0.8);animation:glitch 3s infinite;color:#ff2a6d">$RIOT</span>
      <span style="font-size:11px;color:#a08060">PUNK AGENTS</span>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <span id="status" style="font-size:12px;display:flex;align-items:center;gap:6px;color:#a08060"><span id="dot" class="dot dot-red pulse"></span><span id="status-text">OFFLINE</span></span>
      <span style="font-size:12px;color:#a08060">25 agents</span>
      <button id="connect-btn" class="btn btn-pink" style="font-size:12px;padding:8px 16px">CONNECT WALLET</button>
    </div>
  </div>
  <div style="flex:1;display:flex;overflow:hidden;min-height:0">
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0">
      <div id="agents-grid" style="display:flex;gap:10px;flex-wrap:wrap;padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.1);overflow-x:auto;flex-shrink:0"></div>
      <div id="chat-area" style="flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:10px;min-height:0"></div>
      <div style="display:flex;gap:12px;padding:16px 24px;border-top:1px solid rgba(255,255,255,0.1);flex-shrink:0">
        <input id="msg-input" placeholder="Chat with agent..." style="flex:1" onkeydown="if(event.key==='Enter')sendMsg()" />
        <button class="btn btn-pink" onclick="sendMsg()">SEND</button>
      </div>
    </div>
    <div style="width:280px;border-left:2px solid rgba(255,42,109,0.2);padding:20px;overflow-y:auto;flex-shrink:0">
      <div style="color:#ff2a6d;font-size:12px;text-transform:uppercase;letter-spacing:2px;margin-bottom:16px">MEMORY LOG</div>
      <div id="memory-list"></div>
    </div>
  </div>
</div>
<script>
const AGENTS=[
{id:'J1',name:'The Architect',color:'#00ffff',specialty:'System Design',icon:'🏗️'},
{id:'J2',name:'The Strategist',color:'#ffb703',specialty:'Planning',icon:'🎯'},
{id:'J3',name:'The Builder',color:'#39ff14',specialty:'Code',icon:'🔧'},
{id:'J4',name:'The Rebel',color:'#ff2a6d',specialty:'Chaos',icon:'🔥'},
{id:'J5',name:'The Oracle',color:'#9d4edd',specialty:'Predictions',icon:'🔮'},
{id:'J6',name:'The Diplomat',color:'#2ec4b6',specialty:'Negotiation',icon:'🤝'},
{id:'J7',name:'The Analyst',color:'#00b4d8',specialty:'Data',icon:'📊'},
{id:'J8',name:'The Artist',color:'#ff006e',specialty:'Creativity',icon:'🎨'},
{id:'J9',name:'The Guardian',color:'#ff6b35',specialty:'Security',icon:'🛡️'},
{id:'J10',name:'The Jester',color:'#ffd93d',specialty:'Humor',icon:'🃏'},
{id:'J11',name:'The Veteran',color:'#a08060',specialty:'Memory',icon:'📜'},
{id:'J12',name:'The Pioneer',color:'#00f5ff',specialty:'Exploration',icon:'🚀'},
{id:'J13',name:'The Synthesizer',color:'#b026ff',specialty:'Synthesis',icon:'🧬'},
{id:'J14',name:'The DeFi Degener',color:'#7fff00',specialty:'DeFi',icon:'💸'},
{id:'J15',name:'The Researcher',color:'#00b4d8',specialty:'Research',icon:'🔬'},
{id:'J16',name:'The Note-Taker',color:'#ffb703',specialty:'Notes',icon:'📝'},
{id:'J17',name:'The Curator',color:'#ff006e',specialty:'Art',icon:'🖼️'},
{id:'J18',name:'The Connector',color:'#2ec4b6',specialty:'Networking',icon:'🔗'},
{id:'J19',name:'The Philosopher',color:'#9d4edd',specialty:'Thinking',icon:'🤔'},
{id:'J20',name:'The Tester',color:'#ff2a6d',specialty:'QA',icon:'🧪'},
{id:'J21',name:'The Optimizer',color:'#39ff14',specialty:'Efficiency',icon:'⚡'},
{id:'J22',name:'The Documenter',color:'#a08060',specialty:'Docs',icon:'📚'},
{id:'J23',name:'The Mentor',color:'#00ffff',specialty:'Teaching',icon:'👨‍🏫'},
{id:'J24',name:'The Devil',color:'#ff2a6d',specialty:'Advocacy',icon:'😈'},
{id:'J25',name:'The Wildcard',color:'#ffd93d',specialty:'Wild',icon:'🃏'}
];
let sel=AGENTS[3],msgs=[{t:'sys',x:'💀 FALLBACK MODE — Demo chat active. Set DEEPSEEK_API_KEY on Render + VITE_API_URL in Vercel for AI.'}],mems=JSON.parse(localStorage.getItem('riot_mem')||'[]'),showAll=false;
function save(a,b){mems.push({t:a,b,agent:sel.id,ts:Date.now()});if(mems.length>100)mems.shift();localStorage.setItem('riot_mem',JSON.stringify(mems));renderMem();}
function renderA(){document.getElementById('agents-grid').innerHTML=(showAll?AGENTS:AGENTS.slice(0,12)).map(a=>`<div class="agent${a.id===sel.id?' sel':''}" onclick="selAgent('${a.id}')" style="border-color:${a.id===sel.id?a.color:'transparent'}"><div style="font-size:24px;margin-bottom:4px">${a.icon}</div><div style="font-weight:bold;font-size:12px;color:${a.color}">${a.id}</div><div style="font-size:13px">${a.name}</div><div style="font-size:10px;color:#a08060">${a.specialty}</div></div>`).join('')+(showAll?'':`<button class="btn btn-ghost" onclick="showAll=!showAll;renderA()" style="font-size:11px;height:fit-content;align-self:center">SHOW ALL 25 →</button>`);}
function renderM(){document.getElementById('chat-area').innerHTML=msgs.map(m=>`<div class="${m.t==='sys'?'msg-sys':m.t==='user'?'msg-user':'msg-agent'}">${m.t==='sys'?m.x:`<b style="color:${sel.color}">${m.agent}:</b> ${m.x}`}</div>`).join('');document.getElementById('chat-area').scrollTop=1e9;}
function renderMem(){document.getElementById('memory-list').innerHTML=mems.length?mems.slice().reverse().map(m=>`<div class="mem-item"><span style="color:#ff2a6d;font-weight:bold">${m.agent}:</span> ${m.b.slice(0,60)}...<div style="font-size:10px;color:#6a5040;margin-top:4px">${new Date(m.ts).toLocaleString()}</div></div>`).join(''):'<div style="color:#a08060;font-size:12px">No memories yet. Chat to create memories.</div>';}
function selAgent(id){sel=AGENTS.find(a=>a.id===id);msgs=[{t:'sys',x:'Switched to '+sel.name+'. Start a new conversation.'}];renderA();renderM();}
function sendMsg(){const v=document.getElementById('msg-input').value.trim();if(!v)return;msgs.push({t:'user',x:v,agent:'You'});save('user',v);renderM();document.getElementById('msg-input').value='';setTimeout(()=>{msgs.push({t:'agent',x:`[MEMORY SAVED] ${sel.name}: Demo response. Set DeepSeek key for AI. You said: "${v.slice(0,50)}..."`,agent:sel.id});save('agent',`[Demo] ${v.slice(0,50)}`);renderM();},600);}
document.getElementById('connect-btn').onclick=function(){const dot=document.getElementById('dot'),text=document.getElementById('status-text');if(text.textContent==='OFFLINE'){dot.className='dot dot-green';text.textContent='ONLINE';msgs.push({t:'sys',x:'✅ Wallet connected! (Demo mode)'});}else{dot.className='dot dot-red';text.textContent='OFFLINE';msgs.push({t:'sys',x:'❌ Wallet disconnected.'});}renderM();};
renderA();renderM();renderMem();
</script>
</body>
</html>
