<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$RIOT — The Agentic Memory Layer for Sui</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root" style="width:100vw;height:100vh;background:#0d0a07;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px">
    <h1 style="color:#ff2a6d;font-family:monospace;font-size:32px;text-transform:uppercase;letter-spacing:4px">$RIOT</h1>
    <p style="color:#a08060;font-family:monospace">Loading...</p>
  </div>
  <script>
    const { createElement } = ReactDOM;
    function App() {
      return createElement('div', {
        style: 'width:100vw;height:100vh;background:#0d0a07;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px'
      },
        createElement('h1', {
          style: 'color:#ff2a6d;font-family:monospace;font-size:32px;text-transform:uppercase;letter-spacing:4px'
        }, '$RIOT FULL APP'),
        createElement('p', {
          style: 'color:#a08060;font-family:monospace;font-size:14px'
        }, 'React via CDN works!')
      )
    }
    ReactDOM.createRoot(document.getElementById('root')).render(createElement(App))
  </script>
</body>
</html>
