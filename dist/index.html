<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$RIOT — The Agentic Memory Layer for Sui</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0a07; color: #fff; font-family: 'Courier New', monospace; overflow-x: hidden; }
    .pink { color: #ff2a6d; }
    .orange { color: #ff6b35; }
    .green { color: #2ec4b6; }
    .gold { color: #ffb703; }
    .gray { color: #a08060; }
    .dark { background: rgba(0,0,0,0.5); }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Courier New', monospace; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; }
    .btn-pink { background: linear-gradient(135deg, #ff2a6d, #ff6b35); color: #fff; }
    .btn-pink:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,42,109,0.5); }
    .btn-ghost { background: rgba(255,255,255,0.1); color: #a08060; border: 1px solid rgba(255,255,255,0.2); }
    .btn-ghost:hover { border-color: #ff2a6d; color: #ff2a6d; }
    input { padding: 14px 18px; background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'Courier New', monospace; font-size: 14px; outline: none; width: 100%; }
    input:focus { border-color: #ff2a6d; }
    .agent { cursor: pointer; transition: all 0.3s; padding: 12px; border-radius: 10px; }
    .agent:hover { background: rgba(255,255,255,0.05); transform: translateY(-2px); }
    .agent.selected { border: 2px solid; }
    .glitch { text-shadow: 0 0 20px rgba(255,42,109,0.8); animation: glitch 3s infinite; }
    @keyframes glitch { 0%,90%,100% { transform: none; } 92% { transform: translate(-2px, 1px); } 94% { transform: translate(2px, -1px); } }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-green { background: #2ec4b6; }
    .dot-red { background: #ff2a6d; }
    .msg-user { background: rgba(255,42,109,0.15); padding: 12px 16px; border-radius: 12px 12px 4px 12px; max-width: 75%; margin-left: auto; font-size: 14px; line-height: 1.5; }
    .msg-agent { background: rgba(255,255,255,0.05); padding: 12px 16px; border-radius: 12px 12px 12px 4px; max-width: 75%; font-size: 14px; line-height: 1.5; }
    .msg-system { background: rgba(46,196,182,0.1); padding: 10px 16px; border-radius: 8px; font-size: 12px; color: #a08060; text-align: center; max-width: 85%; margin: 0 auto; }
    .memory-item { padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 8px; font-size: 12px; }
    .memory-item .agent-tag { color: #ff2a6d; font-weight: bold; }
    .memory-item .time { font-size: 10px; color: #6a5040; margin-top: 4px; display: block; }
    .header { padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid rgba(255,42,109,0.3); position: sticky; top: 0; z-index: 100; }
    .title { font-size: 28px; font-weight: bold; letter-spacing: 4px; }
    .status { font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .agents-grid { display: flex; gap: 10px; flex-wrap: wrap; padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); overflow-x: auto; }
    .agent-icon { font-size: 24px; margin-bottom: 4px; }
    .agent-id { font-weight: bold; font-size: 12px; }
    .agent-name { font-size: 13px; }
    .agent-specialty { font-size: 10px; color: #a08060; }
    .chat-area { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 10px; }
    .input-area { display: flex; gap: 12px; padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.1); }
    .input-area input { flex: 1; }
    .input-area button { white-space: nowrap; }
    .memory-panel { width: 280px; border-left: 2px solid rgba(255,42,109,0.2); padding: 20px; overflow-y: auto; }
    .panel-title { color: #ff2a6d; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
    .show-all-btn { display: block; width: 100%; text-align: center; margin-top: 12px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="header dark">
      <div style="display:flex;align-items:center;gap:12px">
        <span class="title glitch pink">$RIOT</span>
        <span class="gray" style="font-size:11px">PUNK AGENTS</span>
      </div>
      <div style="display:flex;align-items:center;gap:16px">
        <div class="status gray">
          <span class="dot dot-red pulse"></span>
          <span id="status-text">OFFLINE</span>
        </div>
        <span class="gray" style="font-size:12px">25 agents</span>
        <button class="btn btn-pink" onclick="toggleConnect()" style="font-size:12px;padding:8px 16px">CONNECT WALLET</button>
      </div>
    </div>
    <div style="flex:1;display:flex;overflow:hidden;height:calc(100vh - 65px)">
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        <div class="agents-grid" id="agents-grid"></div>
        <div class="chat-area" id="chat-area"></div>
        <div class="input-area">
          <input id="msg-input" placeholder="Chat with agent..." onkeydown="if(event.key==='Enter')sendMsg()" />
          <button class="btn btn-pink" onclick="sendMsg()">SEND</button>
        </div>
      </div>
      <div class="memory-panel dark">
        <div class="panel-title">MEMORY LOG</div>
        <div id="memory-list"></div>
      </div>
    </div>
  </div>
  <script>
    const AGENTS = [
      {id:'J1',name:'The Architect',color:'#00ffff',specialty:'System Design',icon:'🏗️'},
      {id:'J2',name:'The Strategist',color:'#ffb703',specialty:'Planning',icon:'🎯'},
      {id:'J3',name:'The Builder',color:'#39ff14',specialty:'Code',icon:'🔧'},
      {id:'J4',name:'The Rebel',color:'#ff2a6d',specialty:'Chaos',icon:'🔥'},
      {id:'J5',name:'The Oracle',color:'#9d4edd',specialty:'Predictions',icon:'🔮'},
      {id:'J6',name:'The Diplomat',color:'#2ec4b6',specialty:'Negotiation',icon:'🤝'},
      {id:'J7',name:'The Analyst',color:'#00b4d8',specialty:'Data',icon:'📊'},
      {id:'J8',name:'The Artist',color:'#ff006e',specialty:'Creativity',icon:'🎨'},
      {id:'J9',name:'The Guardian',color:'#ff6b35',specialty:'Security',icon:'🛡️'},
      {id:'J10',name:'The Jester',color:'#ffd93d',specialty:'Humor',icon:'🃏'},
      {id:'J11',name:'The Veteran',color:'#a08060',specialty:'Memory',icon:'📜'},
      {id:'J12',name:'The Pioneer',color:'#00f5ff',specialty:'Exploration',icon:'🚀'},
      {id:'J13',name:'The Synthesizer',color:'#b026ff',specialty:'Synthesis',icon:'🧬'},
      {id:'J14',name:'The DeFi Degener',color:'#7fff00',specialty:'DeFi',icon:'💸'},
      {id:'J15',name:'The Researcher',color:'#00b4d8',specialty:'Research',icon:'🔬'},
      {id:'J16',name:'The Note-Taker',color:'#ffb703',specialty:'Notes',icon:'📝'},
      {id:'J17',name:'The Curator',color:'#ff006e',specialty:'Art',icon:'🖼️'},
      {id:'J18',name:'The Connector',color:'#2ec4b6',specialty:'Networking',icon:'🔗'},
      {id:'J19',name:'The Philosopher',color:'#9d4edd',specialty:'Thinking',icon:'🤔'},
      {id:'J20',name:'The Tester',color:'#ff2a6d',specialty:'QA',icon:'🧪'},
      {id:'J21',name:'The Optimizer',color:'#39ff14',specialty:'Efficiency',icon:'⚡'},
      {id:'J22',name:'The Documenter',color:'#a08060',specialty:'Docs',icon:'📚'},
      {id:'J23',name:'The Mentor',color:'#00ffff',specialty:'Teaching',icon:'👨‍🏫'},
      {id:'J24',name:'The Devil',color:'#ff2a6d',specialty:'Advocacy',icon:'😈'},
      {id:'J25',name:'The Wildcard',color:'#ffd93d',specialty:'Wild',icon:'🃏'},
    ];

    let selectedAgent = AGENTS[3];
    let messages = [{type:'system',text:'💀 FALLBACK MODE — Demo chat active. Set DEEPSEEK_API_KEY on Render + VITE_API_URL in Vercel for AI responses.'}];
    let memories = JSON.parse(localStorage.getItem('riot_mem') || '[]');
    let showAll = false;

    function saveMem(type, text) {
      memories.push({type, text, agent: selectedAgent.id, ts: Date.now()});
      if (memories.length > 100) memories.shift();
      localStorage.setItem('riot_mem', JSON.stringify(memories));
      renderMem();
    }

    function renderAgents() {
      const grid = document.getElementById('agents-grid');
      const visible = showAll ? AGENTS : AGENTS.slice(0,12);
      grid.innerHTML = visible.map(a => `
        <div class="agent ${a.id===selectedAgent.id?'selected':''}" onclick="selectAgent('${a.id}')" style="border-color:${a.id===selectedAgent.id?a.color:'transparent'}">
          <div class="agent-icon">${a.icon}</div>
          <div class="agent-id" style="color:${a.color}">${a.id}</div>
          <div class="agent-name">${a.name}</div>
          <div class="agent-specialty">${a.specialty}</div>
        </div>`).join('');
      if (!showAll) grid.innerHTML += `<button class="btn btn-ghost show-all-btn" onclick="showAll=!showAll;renderAgents()">SHOW ALL 25 →</button>`;
      else grid.innerHTML += `<button class="btn btn-ghost show-all-btn" onclick="showAll=!showAll;renderAgents()">SHOW LESS</button>`;
    }

    function renderMsgs() {
      const area = document.getElementById('chat-area');
      area.innerHTML = messages.map(m => {
        if (m.type === 'system') return `<div class="msg-system">${m.text}</div>`;
        if (m.type === 'user') return `<div class="msg-user">${m.text}</div>`;
        return `<div class="msg-agent"><b style="color:${selectedAgent.color}">${m.agent}:</b> ${m.text}</div>`;
      }).join('');
      area.scrollTop = area.scrollHeight;
    }

    function renderMem() {
      const list = document.getElementById('memory-list');
      if (!memories.length) { list.innerHTML = '<div class="gray" style="font-size:12px">No memories yet. Chat to create memories.</div>'; return; }
      list.innerHTML = memories.slice().reverse().map(m =>
        `<div class="memory-item"><span class="agent-tag">${m.agent}:</span> ${m.text.slice(0,60)}...<span class="time">${new Date(m.ts).toLocaleString()}</span></div>`
      ).join('');
    }

    function selectAgent(id) {
      selectedAgent = AGENTS.find(a => a.id === id);
      messages = [{type:'system',text:`Switched to ${selectedAgent.name}. ${selectedAgent.id===selectedAgent.id?'New conversation.'}`}];
      renderAgents(); renderMsgs();
    }

    function sendMsg() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;
      messages.push({type:'user',text});
      saveMem('user', text);
      renderMsgs();
      input.value = '';
      setTimeout(() => {
        messages.push({type:'agent',agent:selectedAgent.id,text:`[MEMORY SAVED] ${selectedAgent.name}: Demo response — set DeepSeek key for AI. Your message was: "${text.slice(0,50)}..."`});
        saveMem('agent', `[Demo] ${text.slice(0,50)}`);
        renderMsgs();
      }, 600);
    }

    function toggleConnect() {
      const dot = document.querySelector('.dot');
      const text = document.getElementById('status-text');
      if (text.textContent === 'OFFLINE') {
        dot.className = 'dot dot-green';
        text.textContent = 'ONLINE';
        messages.push({type:'system',text:'✅ Wallet connected! (Demo mode)'});
      } else {
        dot.className = 'dot dot-red';
        text.textContent = 'OFFLINE';
        messages.push({type:'system',text:'❌ Wallet disconnected.'});
      }
      renderMsgs();
    }

    renderAgents();
    renderMsgs();
    renderMem();
  </script>
</body>
</html>
